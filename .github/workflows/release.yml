name: Release — Windows Installer

# タグ vX.Y.Z を push したとき、または手動実行で Windows ビルドを作成する
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-windows:
    name: Windows NSIS Installer
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Create GitHub Release and upload updater assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tagName = "${{ github.ref_name || inputs.tag_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"

          # --- locate generated files ---
          $exeFile   = Get-ChildItem $bundleDir -Filter "*-setup.exe"   | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $zipFile   = Get-ChildItem $bundleDir -Filter "*.nsis.zip"    | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $sigFile   = Get-ChildItem $bundleDir -Filter "*.nsis.zip.sig"| Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $exeFile) { Write-Error "setup.exe not found"; exit 1 }
          if (-not $zipFile) { Write-Error ".nsis.zip not found"; exit 1 }
          if (-not $sigFile) { Write-Error ".nsis.zip.sig not found"; exit 1 }

          # --- read version and signature ---
          $conf    = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version = $conf.version
          $sig     = (Get-Content $sigFile.FullName -Raw).Trim()
          $baseUrl = "https://github.com/myguma/amispi-companion/releases/download/$tagName"

          # --- build latest.json ---
          $latestJson = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$($zipFile.Name)"
              }
            }
          } | ConvertTo-Json -Depth 5
          $latestJson | Out-File "latest.json" -Encoding utf8NoBOM

          # --- create draft release ---
          gh release create $tagName `
            --title "AmitySpirit Companion $tagName" `
            --notes "## AmitySpirit Companion $tagName`n`nインストール方法:`n- \`amispi-companion_${version}_x64-setup.exe\` をダウンロードして実行`n`nアップデート:`n- アプリが自動的に更新を検知します" `
            --draft `
            "$($exeFile.FullName)#amispi-companion_${version}_x64-setup.exe" `
            "$($zipFile.FullName)#amispi-companion_${version}_x64-setup.nsis.zip" `
            "$($sigFile.FullName)#amispi-companion_${version}_x64-setup.nsis.zip.sig" `
            "latest.json#latest.json"
