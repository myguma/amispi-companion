name: Release — Windows Installer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.2.0 or v1.0.0-rc.1)'
        required: true
        default: 'v0.1.0'

jobs:
  build-windows:
    name: Windows NSIS Installer
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      # tauri-action がビルド + Draft Release 作成 + .exe アップロードを行う
      # .nsis.zip / .nsis.zip.sig も生成されるが action 側では latest.json を
      # アップロードしないため、次のステップで手動追加する
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'AmitySpirit Companion ${{ env.RELEASE_TAG }}'
          releaseBody: |
            ## AmitySpirit Companion ${{ env.RELEASE_TAG }}

            インストール方法:
            - `amispi-companion_X.Y.Z_x64-setup.exe` をダウンロードして実行

            アップデート:
            - アプリが自動的に更新を検知します

            詳細は [CHANGELOG.md](https://github.com/myguma/amispi-companion/blob/main/CHANGELOG.md) を参照してください。
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}

      # Tauri v2 (createUpdaterArtifacts:true) は .exe + .exe.sig を生成する。
      # .exe は tauri-action が既にアップロード済みなので .exe.sig と latest.json だけ追加する。
      - name: Upload updater assets (latest.json)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tagName   = "${{ env.RELEASE_TAG }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $conf      = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version   = $conf.version

          # ビルド生成物を確認
          Write-Host "Files in bundle dir:"
          Get-ChildItem $bundleDir | ForEach-Object { Write-Host "  $($_.Name)" }

          # Tauri v2: .exe (インストーラー本体) と .exe.sig (署名) を取得
          $exeFile = Get-ChildItem $bundleDir | Where-Object { $_.Name -match "setup\.exe$" -and $_.Name -notmatch "\.sig$" } | Select-Object -First 1
          $sigFile = Get-ChildItem $bundleDir | Where-Object { $_.Name -match "setup\.exe\.sig$" } | Select-Object -First 1

          if (-not $exeFile) { Write-Error "setup.exe not found in $bundleDir"; exit 1 }
          if (-not $sigFile) { Write-Error "setup.exe.sig not found in $bundleDir"; exit 1 }
          Write-Host "exe: $($exeFile.Name)"
          Write-Host "sig: $($sigFile.Name)"

          $exeName = $exeFile.Name
          $sigName = $sigFile.Name
          $sig     = (Get-Content $sigFile.FullName -Raw).Trim()
          $baseUrl = "https://github.com/myguma/amispi-companion/releases/download/$tagName"

          # latest.json を構築 (URL は .exe を直接指す)
          $latestJson = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$exeName"
              }
            }
          } | ConvertTo-Json -Depth 5
          $latestJson | Out-File "latest.json" -Encoding utf8NoBOM

          # .exe.sig と latest.json をリリースへアップロード (.exe は tauri-action が既にアップロード済み)
          gh release upload $tagName `
            "latest.json#latest.json" `
            "$($sigFile.FullName)#${sigName}" `
            --clobber
          Write-Host "Uploaded to $tagName"
