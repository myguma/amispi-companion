name: Release — Windows Installer

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-windows:
    name: Windows NSIS Installer
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      # tauri-action がビルド + Draft Release 作成 + .exe アップロードを行う
      # .nsis.zip / .nsis.zip.sig も生成されるが action 側では latest.json を
      # アップロードしないため、次のステップで手動追加する
      - name: Build and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || inputs.tag_name }}
          releaseName: 'AmitySpirit Companion ${{ github.ref_name || inputs.tag_name }}'
          releaseBody: |
            ## AmitySpirit Companion ${{ github.ref_name || inputs.tag_name }}

            インストール方法:
            - `amispi-companion_X.Y.Z_x64-setup.exe` をダウンロードして実行

            アップデート:
            - アプリが自動的に更新を検知します

            詳細は [CHANGELOG.md](https://github.com/myguma/amispi-companion/blob/main/CHANGELOG.md) を参照してください。
          releaseDraft: true
          prerelease: false

      # .exe から zip を作り直して署名 → latest.json を構築してアップロード
      # (tauri-action は .nsis.zip を生成するが次ステップ実行時には消えているため)
      - name: Upload updater assets (latest.json)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tagName   = "${{ github.ref_name || inputs.tag_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $conf      = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version   = $conf.version

          # installer exe を探す
          $exeFile = Get-ChildItem $bundleDir | Where-Object { $_.Name -match "setup\.exe$" } | Select-Object -First 1
          if (-not $exeFile) { Write-Error "setup.exe not found in $bundleDir"; exit 1 }
          Write-Host "Installer: $($exeFile.FullName)"

          # zip を作成 (temp に置く)
          $zipName = "amispi-companion_${version}_x64-setup.nsis.zip"
          $zipPath = Join-Path $env:TEMP $zipName
          Compress-Archive -Path $exeFile.FullName -DestinationPath $zipPath -Force
          Write-Host "Created: $zipPath"

          # 秘密鍵で zip に署名 (TAURI_SIGNING_PRIVATE_KEY を env から読む)
          npx tauri signer sign $zipPath
          $sigPath = "$zipPath.sig"
          if (-not (Test-Path $sigPath)) { Write-Error "Signing failed — .sig not found"; exit 1 }
          Write-Host "Signed: $sigPath"

          # latest.json を構築
          $sig     = (Get-Content $sigPath -Raw).Trim()
          $baseUrl = "https://github.com/myguma/amispi-companion/releases/download/$tagName"

          $latestJson = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 5
          $latestJson | Out-File "latest.json" -Encoding utf8NoBOM

          # リリースにアップロード
          gh release upload $tagName `
            "latest.json#latest.json" `
            "${zipPath}#${zipName}" `
            "${sigPath}#${zipName}.sig" `
            --clobber
          Write-Host "Uploaded latest.json + updater assets to $tagName"
