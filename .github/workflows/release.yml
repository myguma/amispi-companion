name: Release — Windows Installer

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-windows:
    name: Windows NSIS Installer
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      # tauri-action がビルド + Draft Release 作成 + .exe アップロードを行う
      # .nsis.zip / .nsis.zip.sig も生成されるが action 側では latest.json を
      # アップロードしないため、次のステップで手動追加する
      - name: Build and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || inputs.tag_name }}
          releaseName: 'AmitySpirit Companion ${{ github.ref_name || inputs.tag_name }}'
          releaseBody: |
            ## AmitySpirit Companion ${{ github.ref_name || inputs.tag_name }}

            インストール方法:
            - `amispi-companion_X.Y.Z_x64-setup.exe` をダウンロードして実行

            アップデート:
            - アプリが自動的に更新を検知します

            詳細は [CHANGELOG.md](https://github.com/myguma/amispi-companion/blob/main/CHANGELOG.md) を参照してください。
          releaseDraft: true
          prerelease: false

      # tauri build が生成した .nsis.zip / .nsis.zip.sig をビルドディレクトリから直接利用。
      # 自前で zip を再作成すると圧縮方式が Tauri updater と非互換になるため使わない。
      - name: Upload updater assets (latest.json)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tagName   = "${{ github.ref_name || inputs.tag_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $conf      = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version   = $conf.version

          # ビルド生成物を確認
          Write-Host "Files in bundle dir:"
          Get-ChildItem $bundleDir | ForEach-Object { Write-Host "  $($_.Name)" }

          # tauri build が生成した zip と sig を取得
          $zipFile = Get-ChildItem $bundleDir | Where-Object { $_.Name -match "setup\.nsis\.zip$" -and $_.Name -notmatch "\.sig$" } | Select-Object -First 1
          $sigFile = Get-ChildItem $bundleDir | Where-Object { $_.Name -match "setup\.nsis\.zip\.sig$" } | Select-Object -First 1

          if (-not $zipFile) { Write-Error "nsis.zip not found in $bundleDir"; exit 1 }
          if (-not $sigFile) { Write-Error "nsis.zip.sig not found in $bundleDir"; exit 1 }
          Write-Host "zip: $($zipFile.Name)"
          Write-Host "sig: $($sigFile.Name)"

          $zipName = $zipFile.Name
          $sig     = (Get-Content $sigFile.FullName -Raw).Trim()
          $baseUrl = "https://github.com/myguma/amispi-companion/releases/download/$tagName"

          # latest.json を構築
          $latestJson = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 5
          $latestJson | Out-File "latest.json" -Encoding utf8NoBOM

          # zip / sig / latest.json をリリースへアップロード
          gh release upload $tagName `
            "latest.json#latest.json" `
            "$($zipFile.FullName)#${zipName}" `
            "$($sigFile.FullName)#${zipName}.sig" `
            --clobber
          Write-Host "Uploaded to $tagName"
